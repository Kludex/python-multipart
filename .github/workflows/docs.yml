name: Deploy Documentation

on:
  push:
    tags:
      - "**"

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # `mkdocs gh-deploy` pushes the built docs to `gh-pages`, so this job needs
      # a real checkout with the authenticated origin remote preserved.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2  # zizmor: ignore[artipacked]

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.9.12"
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - run: uv run mkdocs gh-deploy --force
